<!DOCTYPE html>
<html>
<head>
    <title>Simple Password Page</title>
</head>
<body>
    <h3>Enter Password to Access</h3>
    <input type="password" placeholder="Enter Password">

    <script>
        function password(value) {
        fetch("/api/gamer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ value })
    })
    .then(res => res.json())
    .then(data => {
        if (value === data) {
        window.location.href = "./devdash.html";
        } else {
        localStorage.setItem("iscool?", "yes");
        }
    })
}

    </script>
</body>
</html>
