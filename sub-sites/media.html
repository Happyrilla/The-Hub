<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TMDB Search</title>
</head>
<body>

  <input id="q" placeholder="Search movies..." />
  <button id="btn">Search</button>

  <ul id="out"></ul>

  <script>
    document.getElementById('btn').addEventListener('click', async () => {
      const q = document.getElementById('q').value || 'matrix';

      const res = await fetch(
        "https://the-hubb.netlify.app/.netlify/functions/tmdb?q=" +
        encodeURIComponent(q)
      );

      const data = await res.json();

      const list = document.getElementById('out');
      list.innerHTML = '';

      (data.results || []).forEach(movie => {
        const li = document.createElement('li');
        li.textContent = movie.title;
        list.appendChild(li);
      });
    });
  </script>

</body>
</html>
