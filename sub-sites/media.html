<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TMDB Movies</title>
</head>
<body>

  <h1>Movie Search</h1>

  <input id="q" placeholder="Search movies..." />
  <button id="btn">Search</button>

  <div id="out" style="display:flex; flex-wrap:wrap; gap:15px; margin-top:20px;"></div>

  <script>
    document.getElementById('btn').addEventListener('click', async () => {
      const q = document.getElementById('q').value || 'matrix';

      const res = await fetch(
        "https://the-hubb.netlify.app/.netlify/functions/tmdb?q=" +
        encodeURIComponent(q)
      );

      const data = await res.json();

      const container = document.getElementById('out');
      container.innerHTML = '';

      (data.results || []).forEach(movie => {

        const poster = movie.poster_path
          ? `https://image.tmdb.org/t/p/w300${movie.poster_path}`
          : "https://via.placeholder.com/300x450?text=No+Image";

        const card = document.createElement('div');

        card.style.width = '160px';
        card.style.fontFamily = 'sans-serif';

        card.innerHTML = `
          <img src="${poster}" style="width:100%; border-radius:8px;" />
          <div style="margin-top:6px; font-size:14px;">
            <strong>${movie.title}</strong>
          </div>
          <div style="font-size:12px; opacity:0.7;">
            ⭐ ${movie.vote_average || 'N/A'}
          </div>
        `;

        container.appendChild(card);
      });
    });
  </script>

</body>
</html>
